name: Build ImmortalWrt for CR6608

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build OpenWrt
        uses: P3TERX/Actions-OpenWrt@master
        with:
          repo: immortalwrt/immortalwrt
          branch: master
          config_file: .config
