name: Build ImmortalWrt for CR6608

on:
  workflow_dispatch:
    inputs:
      clean_cache:
        description: 'Clean ccache cache'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean

    - name: Clone ImmortalWrt source (padavanonly closed-source driver)
      run: |
        git clone https://github.com/padavanonly/immortalwrt.git
        cd immortalwrt
        git checkout master

    - name: Update feeds
      run: |
        cd immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Add extra packages feed (kenzok8, openclash)
      run: |
        cd immortalwrt
        echo 'src-git kenzok8 https://github.com/kenzok8/openwrt-packages' >> feeds.conf.default
        echo 'src-git small https://github.com/kenzok8/small' >> feeds.conf.default
        echo 'src-git openclash https://github.com/vernesong/OpenClash.git' >> feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Add OpenClash manually
      run: |
        cd immortalwrt
        mkdir -p package/others/openclash
        cd package/others/openclash
        git init
        git remote add origin https://github.com/vernesong/OpenClash.git
        git config core.sparsecheckout true
        echo "luci-app-openclash" >> .git/info/sparse-checkout
        git pull --depth 1 origin master
        cd ../../../..

    - name: Configure firmware
      run: |
        cd immortalwrt
        # 设置目标平台
        cat >> .config <<EOF
CONFIG_TARGET_mediatek=y
CONFIG_TARGET_mediatek_mt7621=y
CONFIG_TARGET_mediatek_mt7621_DEVICE_xiaomi_mi-router-cr660x=y
CONFIG_TARGET_BOARD="mediatek"
CONFIG_TARGET_SUBTARGET="mt7621"
CONFIG_TARGET_PROFILE="xiaomi_mi-router-cr660x"
CONFIG_TARGET_ROOTFS_PARTSIZE=256
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-ssl-openssl=y
CONFIG_PACKAGE_kmod-mt7615e=y
CONFIG_PACKAGE_kmod-mt7615-firmware=y
CONFIG_PACKAGE_wpad-openssl=y
# IPv6
CONFIG_PACKAGE_ipv6helper=y
CONFIG_PACKAGE_dhcpv6-iaid=y
CONFIG_PACKAGE_odhcp6c=y
CONFIG_PACKAGE_odhcpd-ipv6only=y
# LuCI 插件
CONFIG_PACKAGE_luci-app-zerotier=y
CONFIG_PACKAGE_luci-app-ttyd=y
CONFIG_PACKAGE_luci-app-autoreboot=y
CONFIG_PACKAGE_luci-app-filetransfer=y
CONFIG_PACKAGE_luci-app-samba4=y
CONFIG_PACKAGE_luci-app-wifischedule=y
CONFIG_PACKAGE_luci-app-relay=y
CONFIG_PACKAGE_luci-app-upnp=y
CONFIG_PACKAGE_luci-app-arpbind=y
CONFIG_PACKAGE_luci-app-mwan3=y
CONFIG_PACKAGE_luci-app-turboacc=y
CONFIG_PACKAGE_luci-app-openclash=y
CONFIG_PACKAGE_luci-app-serverchan=y
CONFIG_PACKAGE_luci-theme-argon=y
# OpenClash 依赖
CONFIG_PACKAGE_coreutils-nohup=y
CONFIG_PACKAGE_bash=y
CONFIG_PACKAGE_curl=y
CONFIG_PACKAGE_iptables-mod-tproxy=y
CONFIG_PACKAGE_kmod-tun=y
CONFIG_PACKAGE_ruby=y
CONFIG_PACKAGE_ruby-yaml=y
# 其他必要组件
CONFIG_PACKAGE_openssl-util=y
CONFIG_PACKAGE_block-mount=y
CONFIG_PACKAGE_ddns-scripts_aliyun=y
CONFIG_PACKAGE_ddns-scripts_dnspod=y
CONFIG_PACKAGE_zerotier=y
CONFIG_PACKAGE_luci-proto-ipv6=y
CONFIG_PACKAGE_luci-proto-ppp=y
CONFIG_DEFAULT_luci=y
CONFIG_DEFAULT_luci-theme-argon=y
EOF
        # 启用多线多拨和负载均衡 (mwan3)
        echo "CONFIG_PACKAGE_mwan3=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-mwan3=y" >> .config
        # 开启 UPnP 服务
        echo "CONFIG_PACKAGE_miniupnpd=y" >> .config
        # 无线中继相关
        echo "CONFIG_PACKAGE_wpa-supplicant=y" >> .config
        echo "CONFIG_PACKAGE_hostapd=y" >> .config
        # 文件传输工具
        echo "CONFIG_PACKAGE_openssh-sftp-server=y" >> .config
        # 定时重启
        echo "CONFIG_PACKAGE_cron=y" >> .config
        # 微信推送需要 curl 和 ca-certificates
        echo "CONFIG_PACKAGE_ca-certificates=y" >> .config
        # 节点小宝和 DDNSTO 不在源码中，固件编译后手动安装，这里预留空间
        # 若需要预置可自行下载 ipk 放入 package/ 目录，此处不做处理
        make defconfig

    - name: Download package sources
      run: |
        cd immortalwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build firmware
      run: |
        cd immortalwrt
        echo "开始编译，预计时间较长..."
        make -j$(nproc) V=s || make -j1 V=s
        echo "编译完成"

    - name: Prepare artifact
      run: |
        cd immortalwrt
        mkdir -p ../artifact
        find bin/targets/ -name "*.bin" -exec cp {} ../artifact/ \;
        find bin/targets/ -name "*.itb" -exec cp {} ../artifact/ \;
        find bin/targets/ -name "*.manifest" -exec cp {} ../artifact/ \;
        cd ../artifact
        ls -lah
        echo "FILE_DATE=$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-CR6608-${{ env.FILE_DATE }}
        path: artifact/
        retention-days: 7
