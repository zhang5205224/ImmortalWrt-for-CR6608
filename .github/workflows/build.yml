name: Build ImmortalWrt for CR6608

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ImmortalWrt
        uses: P3TERX/Actions-OpenWrt@main
        with:
          repo: immortalwrt/immortalwrt
          branch: master
          target: x86_64
          file: .config
